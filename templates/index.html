<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Fact-Checker MVP</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Dark slate background */
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Loading Spinner CSS */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Main Container -->
    <div class="glass-panel w-full max-w-2xl rounded-2xl p-8 shadow-2xl transition-all">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                Video Fact-Checker
            </h1>
            <p class="text-slate-400 text-sm">Extract transcripts from YouTube Shorts & Instagram Reels</p>
        </div>

        <!-- Input Form -->
        <form id="transcribeForm" class="space-y-4">
            <div>
                <label for="url" class="block text-sm font-medium text-slate-300 mb-1">Video URL</label>
                <input type="url" id="url" name="url" required placeholder="https://www.youtube.com/shorts/..." 
                    class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white placeholder-slate-500">
            </div>
            
            <button type="submit" id="processBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                <span>Process Video</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </form>

        <!-- Dynamic Status Display -->
        <div id="statusContainer" class="mt-6 text-center hidden">
            <p id="statusText" class="text-blue-400 font-medium animate-pulse">Downloading audio & Transcribing... (This may take a minute)</p>
        </div>

        <!-- Result / Transcript Display -->
        <div id="resultContainer" class="mt-8 hidden">
            <h2 class="text-lg font-semibold text-slate-200 mb-3 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
                Extracted Transcript
            </h2>
            <div class="bg-slate-800/80 p-5 rounded-lg border border-slate-700 max-h-64 overflow-y-auto">
                <p id="transcriptText" class="text-slate-300 leading-relaxed whitespace-pre-wrap"></p>
            </div>
        </div>

        <!-- Error Display -->
        <div id="errorContainer" class="mt-6 hidden bg-red-900/20 border border-red-500/50 p-4 rounded-lg text-center text-red-400 text-sm">
            <p id="errorText"></p>
        </div>
    </div>

    <!-- Frontend Logic -->
    <script>
        const form = document.getElementById('transcribeForm');
        const urlInput = document.getElementById('url');
        const processBtn = document.getElementById('processBtn');
        const btnText = processBtn.querySelector('span');
        const btnSpinner = document.getElementById('btnSpinner');
        
        const statusContainer = document.getElementById('statusContainer');
        const resultContainer = document.getElementById('resultContainer');
        const transcriptText = document.getElementById('transcriptText');
        const errorContainer = document.getElementById('errorContainer');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page refresh
            
            const url = urlInput.value.trim();
            if (!url) return;

            // 1. Update UI to "Loading" state
            processBtn.disabled = true;
            processBtn.classList.replace('bg-blue-600', 'bg-blue-800');
            processBtn.classList.replace('hover:bg-blue-700', 'hover:bg-blue-800');
            processBtn.classList.add('cursor-not-allowed');
            btnText.textContent = 'Processing...';
            btnSpinner.classList.remove('hidden');
            
            statusContainer.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');

            try {
                // 2. Send request to Flask backend
                const response = await fetch('/api/transcribe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to transcribe video');
                }

                // 3. Show successful transcript
                statusContainer.classList.add('hidden');
                transcriptText.textContent = data.text;
                resultContainer.classList.remove('hidden');

            } catch (err) {
                // 4. Show error if something fails
                statusContainer.classList.add('hidden');
                errorText.textContent = err.message;
                errorContainer.classList.remove('hidden');
            } finally {
                // 5. Reset button UI state
                processBtn.disabled = false;
                processBtn.classList.replace('bg-blue-800', 'bg-blue-600');
                processBtn.classList.replace('hover:bg-blue-800', 'hover:bg-blue-700');
                processBtn.classList.remove('cursor-not-allowed');
                btnText.textContent = 'Process Video';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
